<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Fond circulaire vert foncé -->
  <circle cx="100" cy="100" r="98" fill="#134d35" stroke="#1a6b4a" stroke-width="2"/>
  <!-- Croix médicale dorée, grande -->
  <rect x="82" y="48" width="36" height="104" rx="8" fill="#c9a84c"/>
  <rect x="48" y="82" width="104" height="36" rx="8" fill="#c9a84c"/>
