  <!-- Texte -->
  <text x="100" y="170" text-anchor="middle" font-family="Georgia,serif" font-size="11" font-weight="700" fill="rgba(255,255,255,.85)" letter-spacing="2">CLINIQUE</text>
  <text x="100" y="185" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#c9a84c" letter-spacing="1.5">TOUNKARA</text>
