<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex"/>
  <title>Page introuvable — Clinique Tounkara</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/components.css"/>
  <link rel="stylesheet" href="css/responsive.css"/>
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: var(--fond);
    }

    .notfound-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 80px;
    }

    .notfound-box {
      text-align: center;
      max-width: 540px;
    }

    .notfound-num {
      font-family: var(--font-display);
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 700;
      color: var(--vert);
      line-height: 1;
      margin-bottom: 8px;
      letter-spacing: -4px;
      opacity: .15;
      user-select: none;
    }

    .notfound-icon {
      font-size: 64px;
      margin-bottom: 24px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .notfound-box h1 {
      font-size: 2rem;
      margin-bottom: 14px;
      margin-top: -40px;
    }

    .notfound-box p {
      font-size: 1rem;
      max-width: 400px;
      margin: 0 auto 36px;
    }

    .notfound-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .urgence-bloc {
      margin-top: 48px;
      background: var(--rouge-light);
      border: 1.5px solid rgba(220,38,38,.2);
      border-radius: var(--r-xl);
      padding: 20px 28px;
      display: inline-flex;
      align-items: center;
      gap: 14px;
    }

    .urgence-bloc p {
      margin: 0;
      font-size: 13.5px;
      color: var(--rouge);
      font-weight: 500;
    }

    .urgence-bloc a {
      font-weight: 700;
      color: var(--rouge);
      font-size: 15px;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container">

        <div class="navbar-logo-text">

      </a>

    </div>
  </div>
</nav>

<div class="notfound-wrap">

        <rect x="15" y="35" width="70" height="55" rx="5" fill="#d4eddf" stroke="#1a6b4a" stroke-width="2"/>
        <rect x="30" y="15" width="40" height="25" rx="4" fill="#e8f5ed" stroke="#1a6b4a" stroke-width="2"/>
        <rect x="42" y="5" width="16" height="12" rx="3" fill="#c9a84c"/>
        <rect x="45" y="2" width="10" height="18" rx="2.5" fill="#c9a84c"/>
        <rect x="42" y="50" width="16" height="40" rx="3" fill="#1a6b4a" opacity=".35"/>
        <rect x="26" y="46" width="14" height="10" rx="2" fill="#1a6b4a" opacity=".25"/>
        <rect x="60" y="46" width="14" height="10" rx="2" fill="#1a6b4a" opacity=".25"/>
      </svg>
    </div>
    <h1>Page introuvable</h1>

      <a href="rdv.html" class="btn btn-outline btn-lg"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg> Prendre RDV</a>
    </div>
    <div class="urgence-bloc">
      <span><svg viewBox="0 0 24 24" fill="none" width="22" height="22" style="vertical-align:-5px"><rect x="9.5" y="2" width="5" height="20" rx="2" fill="#dc2626"/><rect x="2" y="9.5" width="20" height="5" rx="2" fill="#dc2626"/></svg></span>
      <p>En cas d'urgence médicale, appelez immédiatement :</p>
      <a href="tel:+221775427599">+221 77 542 75 99</a>

  </div>
