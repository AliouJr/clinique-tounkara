  <circle cx="32" cy="32" r="10" fill="#1a7ab0"/>
  <!-- Pupille -->
  <circle cx="32" cy="32" r="5" fill="#0a1a2a"/>
  <!-- Reflet -->
  <circle cx="35" cy="29" r="3" fill="white" opacity=".7"/>
  <!-- Cils -->
  <path d="M18 26 L16 22" stroke="#1a7ab0" stroke-width="2" stroke-linecap="round"/>
  <path d="M22 20 L21 16" stroke="#1a7ab0" stroke-width="2" stroke-linecap="round"/>
  <path d="M32 18 L32 14" stroke="#1a7ab0" stroke-width="2" stroke-linecap="round"/>
  <path d="M42 20 L43 16" stroke="#1a7ab0" stroke-width="2" stroke-linecap="round"/>
  <path d="M46 26 L48 22" stroke="#1a7ab0" stroke-width="2" stroke-linecap="round"/>
</svg>

<!-- ECG / Cardio -->
