  <path d="M32 52 C28 48 22 44 22 40 C22 37 25 35 28 36 C30 37 32 38 32 38 C32 38 34 37 36 36 C39 35 42 37 42 40 C42 44 36 48 32 52Z" fill="#dc2626" opacity=".5"/>
</svg>

