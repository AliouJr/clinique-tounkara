     Ou copier chaque SVG individuellement
-->

<!-- Médecine générale / Stéthoscope -->
<svg id="icon-stethoscope" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <circle cx="32" cy="32" r="30" fill="#d4eddf"/>
  <path d="M22 16 C18 16 15 19 15 23 L15 32 C15 39 20 44 26 45 L26 50 C26 55 30 58 34 58 C38 58 42 55 42 50 L42 46" stroke="#1a6b4a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M22 16 L26 16" stroke="#1a6b4a" stroke-width="3" stroke-linecap="round"/>
  <circle cx="22" cy="15" r="4" fill="#1a6b4a"/>
  <circle cx="26" cy="15" r="4" fill="#1a6b4a"/>
  <circle cx="42" cy="44" r="6" fill="#1a6b4a" stroke="#24915f" stroke-width="2"/>
  <circle cx="42" cy="44" r="2.5" fill="white"/>
</svg>

<!-- Gynécologie / Maternité -->
<svg id="icon-gyneco" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <circle cx="32" cy="32" r="30" fill="#fce8f3"/>
  <!-- Silhouette enceinte stylisée -->
  <path d="M32 12 C26 12 22 17 22 22 C22 26 24 29 28 31 C26 32 22 36 22 42 C22 48 26 52 32 52 C38 52 42 48 42 42 C42 36 38 32 36 31 C40 29 42 26 42 22 C42 17 38 12 32 12Z" fill="#e07ab0" opacity=".3"/>
  <!-- Coeur bébé -->
  <path d="M29 37 C29 34 32 31 32 31 C32 31 35 34 35 37 C35 40 32 43 32 43 C32 43 29 40 29 37Z" fill="#e07ab0"/>
  <!-- Tête bébé stylisée -->
  <circle cx="32" cy="28" r="7" fill="#c9a84c" opacity=".8"/>
</svg>

<!-- Pédiatrie -->
<svg id="icon-pediatrie" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <circle cx="32" cy="32" r="30" fill="#fde8e8"/>
  <!-- Silhouette enfant -->
  <circle cx="32" cy="20" r="9" fill="#dc2626" opacity=".7"/>
  <path d="M20 32 L20 50 C20 50 24 52 32 52 C40 52 44 50 44 50 L44 32 C44 28 40 25 32 25 C24 25 20 28 20 32Z" fill="#dc2626" opacity=".6"/>
  <!-- Bras -->
  <path d="M20 33 L14 42" stroke="#dc2626" stroke-width="5" stroke-linecap="round" opacity=".7"/>
  <path d="M44 33 L50 42" stroke="#dc2626" stroke-width="5" stroke-linecap="round" opacity=".7"/>
  <!-- Sourire -->
  <path d="M28 22 Q32 26 36 22" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>

<!-- Radiologie / Scanner -->
<svg id="icon-radio" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <circle cx="32" cy="32" r="30" fill="#e8f0fd"/>
  <!-- Appareil scanner -->
  <rect x="12" y="24" width="40" height="24" rx="6" fill="#1e50a0" opacity=".8"/>
  <rect x="20" y="20" width="24" height="8" rx="4" fill="#1e50a0" opacity=".6"/>
  <!-- Lit/table -->
  <rect x="10" y="44" width="44" height="6" rx="3" fill="#3a70c0" opacity=".5"/>
  <!-- Patient stylisé -->
  <ellipse cx="32" cy="32" rx="10" ry="5" fill="white" opacity=".6"/>
  <!-- Ondes -->
  <path d="M22 18 Q32 14 42 18" stroke="#c9a84c" stroke-width="2" fill="none" stroke-linecap="round" opacity=".8"/>
</svg>

<!-- Analyses biologiques / Labo -->
<svg id="icon-labo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <circle cx="32" cy="32" r="30" fill="#fdf0e8"/>
  <!-- Éprouvette -->
  <path d="M38 12 L38 38 C38 44 34 48 30 48 C26 48 22 44 22 38 L22 12" stroke="#c9a84c" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <line x1="20" y1="12" x2="40" y2="12" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
  <!-- Liquide dans l'éprouvette -->
  <path d="M22 34 L22 38 C22 44 26 48 30 48 C34 48 38 44 38 38 L38 34Z" fill="#c9a84c" opacity=".5"/>
  <!-- Bulles -->
  <circle cx="28" cy="40" r="2" fill="white" opacity=".7"/>
  <circle cx="33" cy="42" r="1.5" fill="white" opacity=".7"/>
  <!-- Loupe -->
  <circle cx="44" cy="20" r="8" fill="none" stroke="#1a6b4a" stroke-width="2.5"/>
  <line x1="50" y1="26" x2="54" y2="30" stroke="#1a6b4a" stroke-width="3" stroke-linecap="round"/>
</svg>

<!-- Urgences -->
<svg id="icon-urgence" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <circle cx="32" cy="32" r="30" fill="#fee2e2"/>
  <!-- Croix urgences -->
  <rect x="24" y="14" width="16" height="36" rx="4" fill="#dc2626"/>
  <rect x="14" y="24" width="36" height="16" rx="4" fill="#dc2626"/>
  <!-- Éclat / urgence -->
  <path d="M32 8 L34 14 L38 10 L35 16 L40 14 L36 20" stroke="#dc2626" stroke-width="1.5" fill="none" opacity=".5"/>
</svg>

<!-- Chirurgie -->
<svg id="icon-chirurgie" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <circle cx="32" cy="32" r="30" fill="#e8f5e8"/>
  <!-- Scalpel -->
  <path d="M18 46 L42 18 C42 18 46 16 48 18 C50 20 48 24 48 24 L26 46 C24 48 20 48 18 46Z" fill="#1a6b4a" opacity=".8"/>
  <path d="M44 18 L48 22" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Gants chirurgicaux -->
  <path d="M14 38 C12 36 12 32 16 30 L20 28 L22 32 L18 34 L24 40 L20 42 C16 44 16 40 14 38Z" fill="#2a9a5a" opacity=".6"/>
</svg>

<!-- Neurologie / Cerveau -->
<svg id="icon-neuro" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <circle cx="32" cy="32" r="30" fill="#f0e8fc"/>
  <!-- Cerveau stylisé -->
  <path d="M32 14 C24 14 18 20 18 27 C18 32 20 36 24 38 C22 40 21 43 22 46 L32 46 L42 46 C43 43 42 40 40 38 C44 36 46 32 46 27 C46 20 40 14 32 14Z" fill="#9a50c0" opacity=".5"/>
  <path d="M32 14 C24 14 18 20 18 27 C18 32 20 36 24 38" stroke="#8a40b0" stroke-width="2" fill="none"/>
  <!-- Sillons cérébraux -->
  <path d="M24 24 Q28 20 32 24 Q36 28 40 24" stroke="#8a40b0" stroke-width="2" fill="none"/>
  <path d="M20 32 Q26 28 32 32 Q38 36 44 32" stroke="#8a40b0" stroke-width="2" fill="none"/>
  <!-- Éclair (neurones) -->
  <path d="M30 38 L34 42 L30 42 L34 46" stroke="#c9a84c" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
</svg>

<!-- Ophtalmologie / Oeil -->
<svg id="icon-ophtalmo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <circle cx="32" cy="32" r="30" fill="#e8f8fd"/>
