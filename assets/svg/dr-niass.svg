<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 320" width="300" height="320">
  <!-- Fond dégradé -->
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4eddf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8d5bc;stop-opacity:1" />
    </linearGradient>
    <clipPath id="circle1">
      <circle cx="150" cy="105" r="62"/>
    </clipPath>
  </defs>
  <rect width="300" height="320" fill="url(#bg1)"/>
  
  <!-- Motif de fond subtil -->
  <circle cx="40" cy="40" r="60" fill="rgba(26,107,74,.06)"/>
  <circle cx="260" cy="280" r="80" fill="rgba(26,107,74,.06)"/>
  
  <!-- Corps / blouse médicale blanche -->
  <ellipse cx="150" cy="290" rx="90" ry="60" fill="#f8fffe"/>
  <rect x="90" y="240" width="120" height="80" rx="10" fill="#f8fffe"/>
  <!-- Col de la blouse -->
  <path d="M130 240 L150 260 L170 240" fill="none" stroke="#ddeee6" stroke-width="2"/>
  <!-- Poche blouse -->
  <rect x="170" y="255" width="26" height="20" rx="3" fill="none" stroke="#ddeee6" stroke-width="1.5"/>
  <line x1="176" y1="260" x2="190" y2="260" stroke="#c9a84c" stroke-width="1.5"/>
  <!-- Cou -->
  <rect x="135" y="200" width="30" height="45" rx="8" fill="#6b3a1f"/>
  
  <!-- Tête / visage -->
  <ellipse cx="150" cy="148" rx="58" ry="65" fill="#5c3018"/>
  
  <!-- Oreilles -->
  <ellipse cx="93" cy="148" rx="10" ry="14" fill="#5c3018"/>
  <ellipse cx="207" cy="148" rx="10" ry="14" fill="#5c3018"/>
  <ellipse cx="93" cy="148" rx="6" ry="9" fill="#4a2510"/>
  <ellipse cx="207" cy="148" rx="6" ry="9" fill="#4a2510"/>
  
  <!-- Cheveux courts -->
  <ellipse cx="150" cy="94" rx="55" ry="32" fill="#1a0a04"/>
  <ellipse cx="150" cy="88" rx="50" ry="22" fill="#1a0a04"/>
  <!-- Légère ligne de cheveux -->
  <path d="M95 115 Q100 95 150 90 Q200 95 205 115" fill="#1a0a04" stroke="none"/>
  
  <!-- Yeux -->
  <!-- Oeil gauche -->
  <ellipse cx="130" cy="148" rx="12" ry="9" fill="white"/>
  <circle cx="131" cy="148" r="6" fill="#1a0a04"/>
  <circle cx="133" cy="145" r="2" fill="white"/>
  <!-- Oeil droit -->
  <ellipse cx="170" cy="148" rx="12" ry="9" fill="white"/>
  <circle cx="169" cy="148" r="6" fill="#1a0a04"/>
  <circle cx="171" cy="145" r="2" fill="white"/>
  <!-- Sourcils -->
  <path d="M118 137 Q130 132 142 136" stroke="#1a0a04" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M158 136 Q170 132 182 137" stroke="#1a0a04" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Nez -->
  <path d="M147 152 Q143 165 140 170 Q148 174 150 172 Q152 174 160 170 Q157 165 153 152" fill="#4a2510" stroke="none"/>
  
  <!-- Bouche sourire chaleureux -->
  <path d="M134 185 Q150 196 166 185" stroke="#2a1008" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M136 185 Q150 192 164 185" fill="#b05030" opacity=".7"/>
  
  <!-- Lunettes rondes (détail distinctif) -->
  <circle cx="130" cy="148" r="15" fill="none" stroke="#1a2b22" stroke-width="2.5" opacity=".9"/>
  <circle cx="170" cy="148" r="15" fill="none" stroke="#1a2b22" stroke-width="2.5" opacity=".9"/>
  <line x1="145" y1="148" x2="155" y2="148" stroke="#1a2b22" stroke-width="2.5"/>
  <line x1="93" y1="148" x2="115" y2="148" stroke="#1a2b22" stroke-width="2"/>
  <line x1="185" y1="148" x2="207" y2="148" stroke="#1a2b22" stroke-width="2"/>
  
  <!-- Stéthoscope autour du cou -->
  <path d="M125 225 Q110 215 108 200 Q105 185 115 178" stroke="#2a2a2a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M175 225 Q190 215 192 200 Q195 185 185 178" stroke="#2a2a2a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <circle cx="115" cy="175" r="7" fill="#3a3a3a" stroke="#666" stroke-width="1.5"/>
  <circle cx="185" cy="175" r="7" fill="#3a3a3a" stroke="#666" stroke-width="1.5"/>
  
  <!-- Badge "Directeur" -->
  <rect x="96" y="260" width="52" height="20" rx="4" fill="#1a6b4a"/>
  <text x="122" y="274" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="700" fill="white">DIRECTEUR</text>
</svg>
